<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Users - Dishare</title>
<link rel="stylesheet" th:href="@{/styles/global.css}">
<link rel="stylesheet" th:href="@{/styles/list.css}">
</head>
<body>
<div th:replace="navbar :: navbar('👥 Dishare Users','','','', 'h2')"></div>

<div class="container">
<div class="header">
<h1>All Users</h1>
</div>

<div class="filter-section">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search users by name...">
</div>
</div>

<div class="table-container">
<div class="table-header">
<h2>User List</h2>
</div>
<table id="usersTable">
<thead>
<tr>
<th>User Name</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody">
<tr th:each="user : ${users}">
<td class="user-name" th:text="${user.username}">User Name</td>
<td class="action-buttons">
<a class="btn btn-view" th:href="@{/admin/user/{id}(id=${user.id})}">View User</a>
</td>
</tr>
<tr th:if="${users.empty}">
<td colspan="2" class="empty-cell">No users were found.</td>
</tr>
</tbody>
</table>
</div>

<div class="pagination-container">
<span class="page-info">
Showing 1-<span id="endEntry" th:text="${users.size()}">0</span> of <span id="totalEntries" th:text="${users.size()}">0</span> users
</span>
</div>
</div>

<script>
document.getElementById('searchInput').addEventListener('input', function() {
const searchTerm = this.value.trim().toLowerCase();
document.querySelectorAll('#tableBody tr').forEach(row => {
const nameCell = row.querySelector('.user-name');
if (!nameCell) {
return;
}
const name = nameCell.textContent.toLowerCase();
row.style.display = name.includes(searchTerm) ? '' : 'none';
});
});
</script>
</body>
</html>
