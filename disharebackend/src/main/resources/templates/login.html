<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Dishare</title>
<link rel="stylesheet" th:href="@{/styles/global.css}">
<link rel="stylesheet" th:href="@{/styles/login.css}">
</head>
<body>
<div class="login-container">
<div class="login-header">
<h1>Admin Login</h1>
<p>Welcome to Dishare Admin Panel</p>
</div>

<div th:if="${loginError}" class="alert error" th:text="${loginError}"></div>

<form id="loginForm" method="POST" action="/admin/login">
<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="Enter your email" required>
<div class="error-message">Please enter a valid email address</div>
</div>

<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" name="password" placeholder="Enter your password" required>
<div class="error-message">Password is required</div>
</div>

<div class="remember-me">
<input type="checkbox" id="rememberMe" name="rememberMe">
<label for="rememberMe">Remember me</label>
</div>

<button type="submit" class="login-button">Sign In</button>
</form>

<div class="footer-text">
&copy; 2024 Dishare. All rights reserved.
</div>
</div>

<script>
const loginForm = document.getElementById('loginForm');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');

loginForm.addEventListener('submit', function(e) {
let isValid = true;
const emailGroup = emailInput.parentElement;
const passwordGroup = passwordInput.parentElement;

emailGroup.classList.remove('error');
passwordGroup.classList.remove('error');

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailRegex.test(emailInput.value)) {
emailGroup.classList.add('error');
isValid = false;
}

if (passwordInput.value.trim() === '') {
passwordGroup.classList.add('error');
isValid = false;
}

if (!isValid) {
e.preventDefault();
}
});
</script>
</body>
</html>
