<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Recipes - Dishare</title>
<link rel="stylesheet" th:href="@{/styles/global.css}">
<link rel="stylesheet" th:href="@{/styles/list.css}">
</head>
<body>
<div th:replace="navbar :: navbar('🍳 Dishare Recipes','','','', 'h2')"></div>

<div class="container">
<div class="header">
<h1>All Recipes</h1>
</div>

<div class="filter-section">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search recipes...">
</div>
<div class="sort-section">
<label for="sortBy" class="sort-label">Sort by:</label>
<select id="sortBy">
<option value="recent">Most Recent</option>
<option value="oldest">Oldest First</option>
<option value="name">Recipe Name (A-Z)</option>
<option value="author">Author Name (A-Z)</option>
</select>
</div>
</div>

<div class="table-container">
<div class="table-header">
<h2>Recipe List</h2>
</div>
<table id="recipesTable">
<thead>
<tr>
<th>Recipe Name</th>
<th>Author</th>
<th>Posted Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody">
<tr th:each="recipe : ${recipes}"
th:data-name="${recipe.name}"
th:data-author="${recipe.user.username}"
th:data-date="${#temporals.format(recipe.createdDate, 'yyyy-MM-dd')}">
<td class="recipe-name" th:text="${recipe.name}">Recipe Name</td>
<td class="author-name" th:text="${recipe.user.username}">Author Name</td>
<td class="post-date" th:text="${#temporals.format(recipe.createdDate, 'yyyy-MM-dd')}">Date</td>
<td class="action-buttons">
<a class="btn btn-view" th:href="@{/admin/recipe/{id}(id=${recipe.id})}">View Recipe</a>
</td>
</tr>
<tr th:if="${recipes.empty}">
<td colspan="4" class="empty-cell">No recipes found.</td>
</tr>
</tbody>
</table>
</div>

<div class="pagination-container">
<span class="page-info">
Showing 1-<span id="endEntry" th:text="${recipes.size()}">0</span> of <span id="totalEntries" th:text="${recipes.size()}">0</span> recipes
</span>
</div>
</div>

<script>
const searchInput = document.getElementById('searchInput');
const sortBy = document.getElementById('sortBy');
const tableBody = document.getElementById('tableBody');

function updateTable() {
const searchTerm = searchInput.value.trim().toLowerCase();
const rows = Array.from(tableBody.querySelectorAll('tr')).filter(row => row.querySelector('.recipe-name'));

rows.forEach(row => {
const name = row.dataset.name.toLowerCase();
const author = row.dataset.author.toLowerCase();
const isVisible = name.includes(searchTerm) || author.includes(searchTerm);
row.style.display = isVisible ? '' : 'none';
});

const visibleRows = rows.filter(row => row.style.display !== 'none');
const sortType = sortBy.value;
visibleRows.sort((a, b) => {
const nameA = a.dataset.name.toLowerCase();
const nameB = b.dataset.name.toLowerCase();
const authorA = a.dataset.author.toLowerCase();
const authorB = b.dataset.author.toLowerCase();
const dateA = new Date(a.dataset.date);
const dateB = new Date(b.dataset.date);

switch (sortType) {
case 'oldest':
return dateA - dateB;
case 'name':
return nameA.localeCompare(nameB);
case 'author':
return authorA.localeCompare(authorB);
default:
return dateB - dateA;
}
});

visibleRows.forEach(row => tableBody.appendChild(row));
}

searchInput.addEventListener('input', updateTable);
sortBy.addEventListener('change', updateTable);
</script>
</body>
</html>
