<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${user.username} + ' - Dishare'">User Profile - Dishare</title>
<link rel="stylesheet" th:href="@{/styles/global.css}">
<link rel="stylesheet" th:href="@{/styles/detail.css}">
</head>
<body>
<div th:replace="navbar :: navbar('👤 User Profile','javascript:history.back()','← Back','back-button','h2')"></div>

<div class="container">
<div class="user-profile-card">
<div class="profile-header">
<div class="profile-info">
<div class="profile-avatar" th:text="${user.username.substring(0,1).toUpperCase()}">👤</div>
<div class="profile-details">
<h1 th:text="${user.username}">Marco Rossi</h1>
<p th:text="${user.bio != null ? user.bio : 'No bio available.'}">Home Chef & Food Enthusiast</p>
<div class="user-stats">
<div class="stat">
<div class="stat-number" th:text="${recipeCount}">12</div>
<div class="stat-label">Recipes</div>
</div>
<div class="stat">
<div class="stat-number" th:text="${totalViews}">2.5K</div>
<div class="stat-label">Total Views</div>
</div>
<div class="stat">
<div class="stat-number" th:text="${user.email}">email@example.com</div>
<div class="stat-label">Email</div>
</div>
</div>
</div>
</div>

<div class="action-section">
<span class="status-badge"
th:classappend="${user.isBlocked} ? ' status-blocked' : ' status-active'"
th:text="${user.isBlocked} ? '🔴 Blocked' : '🟢 Active'">🟢 Active</span>
<form th:action="@{/admin/user/{id}/toggle-block(id=${user.id})}" method="post" style="margin-top: 1rem;">
<button type="submit" class="btn btn-block" th:text="${user.isBlocked} ? 'Unblock User' : 'Block User'">Block User</button>
</form>
</div>
</div>
</div>

<div class="recipes-section">
<div class="section-header">
<h2 th:text="'📝 Recipes by ' + ${user.username}">📝 Recipes by Marco Rossi</h2>
</div>
<table id="recipesTable">
<thead>
<tr>
<th>Recipe Name</th>
<th>View Count</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody">
<tr th:each="recipe : ${recipes}">
<td class="recipe-name" th:text="${recipe.name}">Spaghetti Carbonara</td>
<td><span class="view-count" th:text="${recipe.views}">892</span></td>
<td class="action-buttons">
<a class="btn btn-view" th:href="@{/admin/recipe/{id}(id=${recipe.id})}">View Recipe</a>
</td>
</tr>
<tr th:if="${recipes.empty}">
<td colspan="3" class="empty-cell">No recipes found for this user.</td>
</tr>
</tbody>
</table>
</div>
</div>

<script>
document.querySelectorAll('.btn-message').forEach(button => {
button.addEventListener('click', function() {
alert('Message feature coming soon!');
});
});
</script>
</body>
</html>
