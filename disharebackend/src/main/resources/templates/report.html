<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Recipes Report - Dishare</title>
<link rel="stylesheet" th:href="@{/styles/global.css}">
<link rel="stylesheet" th:href="@{/styles/list.css}">
</head>
<body>
<div th:replace="navbar :: navbar('📊 Dishare Admin Dashboard','','','', 'h2')"></div>

<div class="container">
<div class="header">
<h1>Top Recipes Report</h1>
</div>

<div class="stats-row">
<div class="stat-card">
<h3>Total Recipes</h3>
<div class="stat-number" th:text="${totalRecipes}">256</div>
</div>
<div class="stat-card">
<h3>Total Views</h3>
<div class="stat-number" th:text="${totalViews}">45.2K</div>
</div>
<div class="stat-card">
<h3>Avg Views</h3>
<div class="stat-number" th:text="${avgViews}">176</div>
</div>
<div class="stat-card">
<h3>Top Recipe Views</h3>
<div class="stat-number" th:text="${topRecipes.size() > 0 ? topRecipes[0].views : 0}">892</div>
</div>
</div>

<div class="table-container">
<div class="table-header">
<h2>Top 10 Most Viewed Recipes</h2>
</div>
<table>
<thead>
<tr>
<th>Rank</th>
<th>Recipe Name</th>
<th>View Count</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr th:each="recipe, iterStat : ${topRecipes}">
<td class="rank" th:text="${iterStat.index + 1}">1</td>
<td class="recipe-name" th:text="${recipe.name}">Recipe Name</td>
<td><span class="view-count" th:text="${recipe.views}">892</span></td>
<td class="action-buttons">
<a class="btn btn-view" th:href="@{/admin/recipe/{id}(id=${recipe.id})}">View Recipe</a>
</td>
</tr>
<tr th:if="${topRecipes.empty}">
<td colspan="4" class="empty-cell">No report data available.</td>
</tr>
</tbody>
</table>
</div>
</div>
</body>
</html>
