<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${recipe.name} + ' - Dishare'">Recipe Details - Dishare</title>
<link rel="stylesheet" th:href="@{/styles/global.css}">
<link rel="stylesheet" th:href="@{/styles/detail.css}">
</head>
<body>
<div th:replace="navbar :: navbar('🍳 Recipe Details','javascript:history.back()','← Back','back-button','h2')"></div>

<div class="container">
<div class="recipe-header">
<img th:src="${recipe.image != null ? recipe.image : 'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=1000&h=400&fit=crop'}"
alt="Recipe Image" class="recipe-image">
<div class="recipe-info">
<h1 class="recipe-title" th:text="${recipe.name}">Spaghetti Carbonara</h1>
<div class="recipe-meta">
<div class="meta-item">
<span class="meta-label">Author:</span>
<span class="meta-value" th:text="${authorName}">Marco Rossi</span>
</div>
<div class="meta-item">
<span class="meta-label">Cooking Time:</span>
<span class="meta-value" th:text="${recipe.cookingTime}">25 minutes</span>
</div>
<div class="meta-item">
<span class="meta-label">Difficulty:</span>
<span class="difficulty-badge difficulty-medium" th:text="${recipe.difficulty}">Medium</span>
</div>
</div>
<div class="view-count">
👁️ <strong th:text="${recipe.views}">892</strong> people have viewed this recipe
</div>
</div>
</div>

<div class="content-section">
<h2 class="section-title">🥘 Ingredients</h2>
<div class="ingredients-list">
<div class="ingredient-item" th:each="ingredient : ${ingredients}">
<input type="checkbox" class="ingredient-checkbox">
<span class="ingredient-text" th:text="${ingredient}">Ingredient</span>
</div>
<div th:if="${ingredients.empty}" class="empty-cell">No ingredient data available.</div>
</div>
</div>

<div class="content-section">
<h2 class="section-title">👨‍🍳 Cooking Steps</h2>
<div class="steps-list">
<div class="step-item" th:each="step, iterStat : ${steps}">
<div class="step-number" th:text="${iterStat.index + 1}">1</div>
<div class="step-content">
<p class="step-description" th:text="${step}">Step description</p>
</div>
</div>
<div th:if="${steps.empty}" class="empty-cell">No step-by-step instructions available.</div>
</div>
</div>
</div>

<script>
document.querySelectorAll('.btn').forEach(button => {
button.addEventListener('click', function() {
const text = this.textContent.trim();
if (text.includes('Like')) {
alert('Recipe liked! ❤️');
} else if (text.includes('Share')) {
alert('Share functionality coming soon!');
} else if (text.includes('Comment')) {
alert('Comment section coming soon!');
}
});
});

document.querySelectorAll('.ingredient-checkbox').forEach(checkbox => {
checkbox.addEventListener('change', function() {
this.parentElement.style.opacity = this.checked ? '0.6' : '1';
});
});
</script>
</body>
</html>
